x-airflow-common: &airflow-common
  build:
    context: ..
    args:
      EXTRA_REQUIREMENTS: ${EXTRA_REQUIREMENTS}
  env_file:
    - ../.env
  volumes:
    - airflow_logs:/opt/airflow/logs
    - airflow_config:/opt/airflow/config
    - airflow_plugins:/opt/airflow/plugins
    - ../pipelines:/opt/pipelines
  user: "${AIRFLOW_UID:-50000}:0"

services:
  airflow-worker:
    <<: *airflow-common
    hostname: ${CELERY_HOSTNAME:-airflow-worker}
    ports:
      - "8793:8793"
    command: bash -c 'airflow celery worker --autoscale 2,1 -H "$${CELERY_HOSTNAME}" -q "$${QUEUES}"'
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type WorkerJob --hostname \"$${CELERY_HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    mem_limit: ${AIRFLOW_WORKER_MEM_LIMIT:-6g}
    environment:
      DUMB_INIT_SETSID: "0"
      PYTHONPATH: /opt/pipelines:/opt/pipelines/dags
      SPARK_HOME: /opt/spark
      PATH: /opt/spark/bin:/home/airflow/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/local/games:/usr/games
    restart: always

volumes:
  airflow_logs:
  airflow_config:
  airflow_plugins: